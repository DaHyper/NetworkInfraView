<form method="post" id="modal-form">
  <div class="form-row">
    <label>Site *</label>
    <select class="form-control" name="site_id" required>
      <option value="">— Select Site —</option>
      {% for s in sites %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
    </select>
  </div>
  <div class="form-grid-2">
    <div class="form-row">
      <label>Name *</label>
      <input class="form-control" type="text" name="name" required>
    </div>
    <div class="form-row">
      <label>Type</label>
      <select class="form-control" name="type">
        <option value="">— Select —</option>
        <option value="fiber">Fiber</option>
        <option value="cable">Cable</option>
        <option value="dsl">DSL</option>
        <option value="lte">LTE/5G</option>
        <option value="satellite">Satellite</option>
        <option value="mpls">MPLS</option>
        <option value="other">Other</option>
      </select>
    </div>
  </div>
  <div class="form-grid-2">
    <div class="form-row">
      <label>ASN</label>
      <input class="form-control" type="text" name="asn" placeholder="e.g. AS7922">
    </div>
    <div class="form-row">
      <label>Public IP Range</label>
      <input class="form-control" type="text" name="public_ip_range" placeholder="e.g. 1.2.3.0/24">
    </div>
  </div>
  <div class="form-row">
    <label>Notes</label>
    <textarea class="form-control" name="notes"></textarea>
  </div>
  <div class="form-actions">
    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>
