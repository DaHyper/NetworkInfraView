<form method="post" id="modal-form">
  <div class="form-grid-2">
    <div class="form-row">
      <label>Site *</label>
      <select class="form-control" name="site_id" required>
        <option value="">— Select Site —</option>
        {% for s in sites %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-row">
      <label>VLAN ID</label>
      <input class="form-control" type="number" name="vlan_id" min="1" max="4094" placeholder="e.g. 10">
    </div>
  </div>
  <div class="form-grid-2">
    <div class="form-row">
      <label>Name *</label>
      <input class="form-control" type="text" name="name" required placeholder="e.g. Management">
    </div>
    <div class="form-row">
      <label>Subnet (CIDR)</label>
      <input class="form-control" type="text" name="subnet" placeholder="10.0.10.0/24">
    </div>
  </div>
  <div class="form-row">
    <label>Color (for diagram)</label>
    <input class="form-control" type="color" name="color" value="#6366f1" style="height:34px;padding:2px 4px;">
  </div>
  <div class="form-row">
    <label>Description</label>
    <textarea class="form-control" name="description"></textarea>
  </div>
  <div class="form-actions">
    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>
