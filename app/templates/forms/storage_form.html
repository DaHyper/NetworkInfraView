<form method="post" id="modal-form">
  <div class="form-grid-2">
    <div class="form-row">
      <label>Site *</label>
      <select class="form-control" name="site_id" required>
        <option value="">— Select Site —</option>
        {% for s in sites %}<option value="{{ s.id }}">{{ s.name }}</option>{% endfor %}
      </select>
    </div>
    <div class="form-row">
      <label>Name *</label>
      <input class="form-control" type="text" name="name" required placeholder="e.g. Synology DS923+">
    </div>
  </div>
  <div class="form-grid-2">
    <div class="form-row">
      <label>Type</label>
      <select class="form-control" name="type">
        <option value="nas">NAS</option>
        <option value="san">SAN</option>
        <option value="cloud">Cloud</option>
        <option value="local">Local</option>
        <option value="tape">Tape</option>
        <option value="other">Other</option>
      </select>
    </div>
    <div class="form-row">
      <label>Capacity (TB)</label>
      <input class="form-control" type="number" step="0.1" name="capacity_tb" min="0">
    </div>
  </div>
  <div class="form-grid-2">
    <div class="form-row">
      <label>IP Address</label>
      <input class="form-control" type="text" name="ip_address" placeholder="192.168.1.20">
    </div>
    <div class="form-row">
      <label>Protocol(s)</label>
      <input class="form-control" type="text" name="protocol" placeholder="NFS, SMB, iSCSI">
    </div>
  </div>
  <div class="form-row">
    <label>Make / Model</label>
    <input class="form-control" type="text" name="make_model">
  </div>
  <div class="form-row">
    <label>Notes</label>
    <textarea class="form-control" name="notes"></textarea>
  </div>
  <div class="form-actions">
    <button type="button" class="btn" onclick="closeModal()">Cancel</button>
    <button type="submit" class="btn btn-primary">Save</button>
  </div>
</form>
